<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>E-Commerce Backend</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {

      font-family: Arial, sans-serif;

      background: linear-gradient(to right, #141e30, #243b55);

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

    }


    .container {

      width: 450px;

      background-color: white;

      padding: 40px;

      border-radius: 15px;

      box-shadow: 0px 0px 20px rgba(0,0,0,0.3);

      text-align: center;

    }


    h1 {

      color: #243b55;

      margin-bottom: 20px;

    }


    .status {

      background-color: #f4f4f4;

      padding: 15px;

      margin-top: 15px;

      border-radius: 10px;

      font-size: 18px;

      font-weight: bold;

    }


    .success {

      color: green;

    }


    .footer {

      margin-top: 25px;

      color: gray;

      font-size: 14px;

    }


    button {

      margin-top: 25px;

      padding: 12px 25px;

      border: none;

      background-color: #243b55;

      color: white;

      border-radius: 8px;

      cursor: pointer;

      font-size: 16px;

    }


    button:hover {

      background-color: #141e30;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>E-Commerce Backend System</h1>

    <div class="status success">
      Server Started Successfully
    </div>

    <div class="status success">
      MongoDB Connected
    </div>

    <div class="status success">
      JWT Authentication Enabled
    </div>

    <div class="status success">
      Product Recommendation API Ready
    </div>

    <button>
      Backend Running
    </button>

    <div class="footer">
      Developed Using Node.js, Express.js & MongoDB
    </div>

  </div>

</body>

</html>
